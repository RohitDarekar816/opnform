---
services:
  db:
    image: postgres:16-alpine
    container_name: opnform-db
    networks:
      - afintrix-network
    environment:
      POSTGRES_DB: ${DB_DATABASE:-afintrix}
      POSTGRES_USER: ${DB_USERNAME:-afintrix}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-}
    volumes:
      - afintrix-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-afintrix}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: opnform-redis
    networks:
      - afintrix-network
      - proxy
    volumes:
      - afintrix-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  api: &api-service
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        APP_VERSION: ${APP_VERSION:-unknown}
    container_name: opnform-api
    working_dir: /usr/share/nginx/html
    networks:
      - afintrix-network
      - proxy
    volumes:
      - afintrix-storage:/usr/share/nginx/html/storage:rw
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      FRONT_URL: ${FRONT_URL:-http://localhost}
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-afintrix}
      DB_USERNAME: ${DB_USERNAME:-afintrix}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_CONNECTION: pgsql
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: predis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      FILESYSTEM_DRIVER: local
      LOCAL_FILESYSTEM_VISIBILITY: public
      PHP_MEMORY_LIMIT: "512M"
      PHP_MAX_EXECUTION_TIME: "300"
      PHP_UPLOAD_MAX_FILESIZE: "64M"
      PHP_POST_MAX_SIZE: "64M"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "php /usr/share/nginx/html/artisan about --only=environment 2>&1 | grep -q 'Environment' || exit 1",
        ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  api-worker:
    <<: *api-service
    container_name: opnform-api-worker
    command:
      [
        "php",
        "artisan",
        "queue:work",
        "--sleep=3",
        "--tries=3",
        "--max-time=3600",
      ]
    healthcheck:
      test:
        ["CMD-SHELL", "pgrep -f 'php artisan queue:work' > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  api-scheduler:
    <<: *api-service
    container_name: opnform-api-scheduler
    command: ["php", "artisan", "schedule:work"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "php /usr/share/nginx/html/artisan app:scheduler-status --mode=check --max-minutes=3 || exit 1",
        ]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 70s

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    container_name: opnform-ui
    networks:
      - afintrix-network
      - proxy
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_APP_ENV: production
      NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL:-/}
      NUXT_PUBLIC_API_BASE: /api
      NUXT_PRIVATE_API_BASE: http://opnform-api
      NUXT_PUBLIC_H_CAPTCHA_SITE_KEY: ${NUXT_PUBLIC_H_CAPTCHA_SITE_KEY:-}
      NUXT_PUBLIC_RE_CAPTCHA_SITE_KEY: ${NUXT_PUBLIC_RE_CAPTCHA_SITE_KEY:-}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    restart: unless-stopped

  ingress:
    image: nginx:1.27-alpine
    container_name: opnform-ingress
    networks:
      - afintrix-network
      - proxy
    volumes:
      - ./docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    depends_on:
      api:
        condition: service_started
      ui:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && wget --spider -q http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  afintrix-network:
    name: afintrix-network
  proxy:
    external: true

volumes:
  afintrix-db-data:
    name: afintrix-db-data
  afintrix-storage:
    name: afintrix-storage
  afintrix-redis-data:
    name: afintrix-redis-data
