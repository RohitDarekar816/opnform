services:
  afintrix-db:
    image: postgres:16-alpine
    container_name: afintrix-db
    environment:
      POSTGRES_DB: ${DB_DATABASE:-afintrix}
      POSTGRES_USER: ${DB_USERNAME:-afintrix}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-afintrix}
    volumes:
      - afintrix-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-afintrix}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  afintrix-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: afintrix-api
    working_dir: /usr/share/nginx/html
    volumes:
      - ./api:/usr/share/nginx/html:delegated
      - afintrix-storage:/usr/share/nginx/html/storage:delegated
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_DEV_CORS: "true"
      APP_URL: http://localhost
      FRONT_URL: http://localhost:3000
      APP_KEY: ${APP_KEY:-base64:dD8AFEB45nKZ0VWmIPiW495rDYb+ywRJnCCSdycw0pI=}
      JWT_SECRET: ${JWT_SECRET:-38hjE96gYu4ceKSSHNnzgeynMr2m3WkNBN2u7zzpVeiITtxFEloxAjcr7TCKuiiy}
      DB_HOST: afintrix-db
      DB_DATABASE: ${DB_DATABASE:-afintrix}
      DB_USERNAME: ${DB_USERNAME:-afintrix}
      DB_PASSWORD: ${DB_PASSWORD:-afintrix}
      DB_CONNECTION: pgsql
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      FILESYSTEM_DRIVER: local
      LOCAL_FILESYSTEM_VISIBILITY: public
      MAIL_MAILER: log
      MAIL_FROM_ADDRESS: dev@localhost
      MAIL_FROM_NAME: Afintrix-Dev
      PHP_MEMORY_LIMIT: "1G"
      PHP_MAX_EXECUTION_TIME: "600"
      PHP_UPLOAD_MAX_FILESIZE: "64M"
      PHP_POST_MAX_SIZE: "64M"
      PHP_IDE_CONFIG: serverName=Docker
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      XDEBUG_CONFIG: client_host=host.docker.internal
    depends_on:
      afintrix-db:
        condition: service_healthy
    ports:
      - "8000:8000"

  afintrix-ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    container_name: afintrix-ui
    depends_on:
      - afintrix-api
    volumes:
      - ./client:/app:delegated
      - afintrix-client-node-modules:/app/node_modules
    environment:
      NODE_ENV: development
      NUXT_PUBLIC_APP_ENV: development
      NUXT_PUBLIC_APP_URL: "http://localhost:3000"
      NUXT_PUBLIC_API_BASE: "http://localhost:8000"
      NUXT_PRIVATE_API_BASE: "http://afintrix-api:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
      - "24678:24678"
    command: >
      sh -c "
      if [ ! -f node_modules/.install-complete ] || [ package.json -nt node_modules/.install-complete ]; then
        npm install && touch node_modules/.install-complete;
      else
        echo 'Dependencies up to date, skipping install';
      fi && npm run docker-dev"

  afintrix-ingress:
    image: nginx:1.27-alpine
    container_name: afintrix-ingress
    volumes:
      - ./docker/nginx.dev.conf:/etc/nginx/templates/default.conf.template
    environment:
      NGINX_HOST: localhost
      NGINX_PORT: 80
      NGINX_MAX_BODY_SIZE: 64m
    ports:
      - "80:80"
    depends_on:
      - afintrix-api
      - afintrix-ui

volumes:
  afintrix-postgres-data:
  afintrix-storage:
  afintrix-client-node-modules:
